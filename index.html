<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Quiz App</title>
  </head>
  <body>
    <main class="quiz-container">
      <section class="quiz-card" aria-labelledby="quiz-title">
        <h1 id="quiz-title" class="quiz-title">Quiz App</h1>

        <section class="question-area" aria-labelledby="question">
          <h2 id="question">Question comes here</h2>
        </section>

        <section id="answers-container" aria-label="Answer options">
          <button class="answer-btn btn btn-outline-primary" type="button">
            Answer 1
          </button>
          <button class="answer-btn btn btn-outline-primary" type="button">
            Answer 2
          </button>
          <button class="answer-btn btn btn-outline-primary" type="button">
            Answer 3
          </button>
          <button class="answer-btn btn btn-outline-primary" type="button">
            Answer 4
          </button>
        </section>

        <footer class="footer-area">
          <button class="btn btn-primary" type="button">Next Question</button>
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>

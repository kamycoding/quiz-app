<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />

    <link rel="icon" href="img/faveicon/favicon.ico" sizes="any" />
    <link
      rel="icon"
      href="img/faveicon/favicon.svg"
      type="image/svg+xml"
    />
    <link
      rel="icon"
      href="img/faveicon/favicon-96x96.png"
      type="image/png"
      sizes="96x96"
    />
    <link rel="apple-touch-icon" href="img/faveicon/apple-touch-icon.png" />
    <link rel="manifest" href="img/faveicon/site.webmanifest" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Quiz App</title>
  </head>

  <body>
    <main class="app-shell">
      <div class="tech-icons" aria-hidden="true">
        <img
          class="tech-icon tech-icon-css"
          src="img/icon/logos_css-3.svg"
          alt=""
        />

        <img
          class="tech-icon tech-icon-html"
          src="img/icon/logos_html-5.svg"
          alt=""
        />

        <img
          class="tech-icon tech-icon-js"
          src="img/icon/skill-icons_javascript.svg"
          alt=""
        />
      </div>

      <div
        class="card-hero-visual welcome-visual"
        id="welcome-visual"
        aria-hidden="true"
      >
        <img
          class="hero-character"
          src="img/icon/kamycoding.svg"
          alt=""
        />
      </div>

      <div class="card-hero-visual end-visual" id="end-visual" aria-hidden="true">
        <img class="hero-character" src="img/icon/end-svg.svg" alt="" />
      </div>

      <section class="quiz-card" aria-labelledby="app-title">
        <section id="welcome-screen" class="screen welcome-screen">
          <p class="eyebrow">Frontend Knowledge Check</p>

          <h1 id="app-title" class="welcome-title">
            Welcome to<br />
            <span class="welcome-title-brand">Kamycoding</span><br />
            Quiz App
          </h1>

          <p class="welcome-text">
            Test your HTML, CSS and JavaScript basics in a clean and focused
            quiz experience.
          </p>

          <button id="start-button" class="primary-button" type="button">
            Start Quiz
          </button>
        </section>

        <section id="quiz-screen" class="screen quiz-screen d-none">
          <div class="progress-wrapper" aria-label="Quiz progress">
            <div class="progress-track">
              <div id="progress-bar" class="progress-fill"></div>
            </div>

            <span id="progress-label" class="progress-label">0%</span>
          </div>

          <div class="question-content">
            <p class="question-counter">
              Question
              <span id="current-question">1</span>
              of
              <span id="total-questions">0</span>
            </p>

            <div class="question-area">
              <h2 id="question">Question comes here</h2>
            </div>

            <div id="answers-container" aria-label="Answer options"></div>

            <footer class="footer-area">
              <button
                id="next-button"
                class="primary-button next-button"
                type="button"
                disabled
              >
                Next Question
              </button>
            </footer>
          </div>
        </section>

        <section
          id="end-screen"
          class="screen end-screen d-none"
          aria-live="polite"
        >
          <div class="result-content">
            <p class="eyebrow">Result</p>

            <h2 class="result-title">Quiz finished</h2>

            <p class="result-text">
              You answered
              <strong id="score">0</strong>
              of
              <strong id="final-total">0</strong>
              questions correctly.
            </p>

            <button id="restart-button" class="primary-button" type="button">
              Play again
            </button>
          </div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
